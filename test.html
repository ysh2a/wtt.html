<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자기소개서</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            color: #2c3e50;
        }

        h2 {
            color: #34495e;
            padding-left: 1px;
            margin-top: 30px;
        }

        h3 {
            color: #34495e;
            border-left: 4px solid #4a90e2;
            padding-left: 10px;
            margin-top: 10px;
        }

        p {
            line-height: 1.8;
            color: #555;
            margin-top: 10px;
        }

        .highlight {
            color: #4a90e2;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #aaa;
            font-size: 12px;
        }
        .overlap {
    position: relative;
    width: 200px;       /* 영역 크기 꼭 필요 */
    height: 120px;
    margin: 40px auto;  /* 가운데 정렬 */
}

.overlap img {
    width: 30%;
    height: 50%;
    object-fit: cover;
}

    </style>
</head>
<body>

<div class="container">
    <h1>자기소개서</h1>
<img src="https://github.com/mjh117/1st-book/blob/main/02%EC%9E%A5/step/04/capyzou.png?raw=true" width="100px" alt="카피조우의증명사진">
<h2><tr><th>연차</th><th>매출</th><th>비고</th></tr></h2>    
<h3>성장 과정</h3>
    <p>
        저는 <span class="highlight">책임감과 꾸준함</span>을 중요하게 생각하는 환경에서 성장했습니다.
        맡은 일은 끝까지 해내는 태도를 배우며 다양한 경험을 쌓았습니다.
    </p>

    <h3>성격의 장단점</h3>
    <p>
        저의 장점은 <span class="highlight">꼼꼼함과 책임감</span>입니다.
        단점은 완벽을 추구하는 성향이지만, 이를 개선하기 위해 노력하고 있습니다.
    </p>

    <h3>지원 동기</h3>
    <p>
        저는 <span class="highlight">문제 해결 능력</span>을 바탕으로 성장하고,
        조직에 기여하고자 지원했습니다.
    </p>

    <h3>포부</h3>
    <p>
        지속적인 학습을 통해 <span class="highlight">전문성을 갖춘 인재</span>로 성장하겠습니다.
    </p>
<div class="footer overlap">
    <img src="https://github.com/ysh2a/23011101/blob/408bb975657b3dcda57569dfca07130b54fd7fac/ing1.html">
</div>
</div>

</body>
</html>
